
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Jeremiah">
    <meta name="keywords" content="shipping">
    <meta name="description" content="This is a shipping company">

    <title>Signup</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>

<div class="container1" id="container1">
    <div class="container2" id="container2">
        <h1>Sign Up</h1>
        <form action="index.html" method="get">
            <div class="form-group">
                <label for="fname">Full Name:</label>
                <input type="text" id="fname" name="Name" placeholder="Enter name" autofocus required>
            </div>

            <div class="form-group">
                <label for="em">Email:</label>
                <input type="email" id="em" name="Email" placeholder="Enter Email" required>
            </div>

            <div class="form-group">
                <label for="pw">Password:</label>
                <input type="password" id="pw" name="Password" placeholder="Password" required>
            </div>

            <button type="submit">Sign Up</button>
        </form>
    </div>
</div>
</body>
</html>
